<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
	<body>

		<button id = "user_array" type="button">Show All Users (Array) </button>
		<button id = "user_object" type="button">Show All Users (Objects)</button>
		<button id = "get_button" type="button">Get User </button>
		<button id = "post_button" type="button">Post User </button>
		
		<!-- Users Array -->
		<h4> Show Users Array </h4>
		<div id = "users_array"></div>		
		
		<!-- Users Object -->
		<h4> Show Users Object </h4>
		<div id = "users_object"></div>

		
		<script>		

			//GET REQUEST 
			document.getElementById('get_button').addEventListener('click', getUser);	

			function getUser() {

				var xhr = new XMLHttpRequest();
				xhr.open('GET', 'adobe.php?name=David', true);

				//Send Request
				xhr.onload = function() {
				if (this.status == 200) {
					console.log(this.responseText);

					} else if(this.status = 404) {
						console.log("not found ");
					} else {
						console.log("Some other error");
					}
				}

				//Error Handing
				xhr.onerror = function() {
					console.log('Request Error ')
				}

				xhr.send();

			}

			
		</script>		
	</body>
</html>

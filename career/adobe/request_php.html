<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
	<body>

		<button id = "get_button" type="button">Get User </button>
		<button id = "post_button" type="button">Post User </button>

		
		<script>		
			
			//GET REQUEST 
			document.getElementById('get_button').addEventListener('click', getUser);	

			function getUser() {

				var xhr = new XMLHttpRequest();
				xhr.open('GET', 'process.php?name=David', true);

				//Send Request
				xhr.onload = function() {
				if (this.status == 200) {
					console.log(this.responseText);

					} else if(this.status = 404) {
						console.log("not found ");
					} else {
						console.log("Some other error");
					}
				}

				//Error Handing
				xhr.onerror = function() {
					console.log('Request Error ')
				}

				xhr.send();

			}

			//POST REQUEST 
			document.getElementById('post_button').addEventListener('click', postUser);	

			function postUser() {
				var http = new XMLHttpRequest();
				var url = 'process.php';
				var params = 'name=david&location=shire';
				http.open('POST', url, true);

				//Send the proper header information along with the request
				http.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');

				http.onreadystatechange = function() {//Call a function when the state changes.
					if(http.readyState == 4 && http.status == 200) {
						console.log(http.responseText);
					}
				}
				http.send(params);

			}
			
		</script>		
	</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
	<body>

		<button id = "button" type="button">Click Me!</button>
		<p id = "text" class = "text-field"></p>
		
		<script>			
		//HTTP Statuses
		//200: Ok
		//403: Forbidden
		//404: Not Found 
		//document.getElementById('button').addEventListener('click', loadText)
		document.getElementById('button').addEventListener('click', loadText);
		
		function loadText() {
			console.log("clicked");

			//Create XHR Object
			var xhr = new XMLHttpRequest();

			//Open (Type, URL or File, Aysnc (T or F))
			console.log(xhr)
			xhr.open('GET', 'sample.txt', true);

			//OPTIONAL: (used for loaders those spinnys)
			xhr.onprogress = function() {
				console.log('READY STATE 3 ', xhr.readyState)
			}
			
			//Two Functions (Onload (Newer) or OnReadyStateChange (older))
			xhr.onload = function() {
				//if (this.readyState == 4 && this.status == 200) {
				if (this.status == 200) {
					console.log(this.responseText);
					document.getElementById('text').innerHTML = this.responseText;
				} else if(this.status = 404) {
					console.log("not found ");
				} else {
					console.log("Some other error");
				}

			}

			//Error Handing
			xhr.onerror = function() {
				console.log('Request Error ')
			}

			xhr.send();

		}

		//Old 	
		function loadTextOld() {
			//Create XHR Object
			var xhr = new XMLHttpRequest();
			xhr.open('GET', 'sample.txt', true);
			
			console.log('READY STATE ', xhr.readyState)

			//Two Functions (Onload (Newer) or OnReadyStateChange (older))
			xhr.onreadystatechange = function() {
				console.log('READY STATE 2 ', xhr.readyState)

				if (this.readyState == 4 && this.status == 200) {
					console.log(this.responseText);
				}
			}
			xhr.send();
			//0: Request not initalized
			//1: Server connection established
			//2: Request Recieved
			//3: Processing Request
			//4: Request Finished and response ready

		}
		</script>		
	</body>
</html>

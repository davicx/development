<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
	<body>

		<button id = "buttonOne" type="button">Get User </button>
		<button id = "buttonTwo" type="button">Get Users </button>
		
		<h4> User </h4>
		<div id = "user">

		</div>

		<h4> Users </h4>		
		<div id = "users">
			
		</div>


		<script>
			document.getElementById('buttonOne').addEventListener('click', loadUser);
			document.getElementById('buttonTwo').addEventListener('click', loadUsers);

			//Function A.1: Load Single User 
			function loadUser() {
	
				console.log("Load User")
				var xhr = new XMLHttpRequest();
				xhr.open('GET', 'user.json', true);
				
				//Send Request
				xhr.onload = function() {
					if (this.status == 200) {
						//console.log(this.responseText);
						var user = JSON.parse(this.responseText);
						//console.log(user.name);
						var output = '';
						
						output += '<ul>' + 
							'<li>ID: ' + user.id + '</li>' +
							'<li>Name: ' + user.name + '</li>' +
							'<li>Email: ' + user.email + '</li>' +
							'</ul>';
							console.log(user.id);
							console.log(user);
							console.log(output);
						document.getElementById('user').innerHTML = output;

					} else if(this.status = 404) {
						console.log("not found ");
					} else {
						console.log("Some other error");
					}
				}

				//Error Handing
				xhr.onerror = function() {
					console.log('Request Error ')
				}

				xhr.send();
		
			}

			//Function A.1: Load Users  
			function loadUsers() {
				console.log("Load ALL Users")
				var xhr = new XMLHttpRequest();
				xhr.open('GET', 'users.json', true);
				
				//Send Request
				xhr.onload = function() {
					if (this.status == 200) {
						//console.log(this.responseText);
						var users = JSON.parse(this.responseText);

						console.log(users);
						//var output = '<p> hi </p>';
						var output = '';

					
						for(var i in users) {
							output += '<ul>' + 
								'<li>ID: ' + users[i].id + '</li>' +
								'<li>Name: ' + users[i].name + '</li>' +
								'<li>Email: ' + users[i].email + '</li>' +
								'</ul>';
						}
						document.getElementById('users').innerHTML = output;				
						console.log(output);		

					} else if(this.status = 404) {
						console.log("not found ");
					} else {
						console.log("Some other error");
					}
				}

				//Error Handing
				xhr.onerror = function() {
					console.log('Request Error ')
				}

				xhr.send();
			
			}

		</script>

	</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
	<body>

		<button id = "user_array" type="button">Show All Users (Array) </button>
		<button id = "user_object" type="button">Show All Users (Objects)</button>
		<button id = "get_button" type="button">Get User </button>
		<button id = "post_button" type="button">Post User </button>
		
		<!-- Users Array -->
		<h4> Show Users Array </h4>
		<div id = "users_array"></div>

		
		<script>		
			
            //USERS OBJECT 
			document.getElementById('user_object').addEventListener('click', loadUsers);	

			function loadUsers() {

				var xhr = new XMLHttpRequest();
				xhr.open('GET', 'adobe.php?users_object=true', true);
				
				//Send Request
				xhr.onload = function() {
					if (this.status == 200) {
						console.log(this.responseText);
						var users = JSON.parse(this.responseText);

					} else if(this.status = 404) {
						console.log("not found ");
					} else {
						console.log("Some other error");
					}
				}

				//Error Handing
				xhr.onerror = function() {
					console.log('Request Error ')
				}

				xhr.send();
			
			}		
			
            //USERS ARRAY 
			document.getElementById('user_array').addEventListener('click', loadUsers);	

			function loadUsers() {

				var xhr = new XMLHttpRequest();
				xhr.open('GET', 'adobe.php?users_array=true', true);
				
				//Send Request
				xhr.onload = function() {
					if (this.status == 200) {
						//console.log(this.responseText);
						var users = JSON.parse(this.responseText);

						//for (var key in value)
                        
						var output = '<ul> <li>item 1</li> <li>item 2</li> </ul>';
						//output += '<ul>';
						for (var name in users) {
							if (users.hasOwnProperty(name)) {
								console.log(name + " " + users[name]);
								//'<li>Name: ' + name + ' Age ' + users[name] + '</li>';
								
							}
						}
						//output += '</ul>';
                        document.getElementById('users_array').innerHTML = output;	      

					} else if(this.status = 404) {
						console.log("not found ");
					} else {
						console.log("Some other error");
					}
				}

				//Error Handing
				xhr.onerror = function() {
					console.log('Request Error ')
				}

				xhr.send();
			
			}

			//GET REQUEST 
			document.getElementById('get_button').addEventListener('click', getUser);	

			function getUser() {

				var xhr = new XMLHttpRequest();
				xhr.open('GET', 'adobe.php?name=David', true);

				//Send Request
				xhr.onload = function() {
				if (this.status == 200) {
					console.log(this.responseText);

					} else if(this.status = 404) {
						console.log("not found ");
					} else {
						console.log("Some other error");
					}
				}

				//Error Handing
				xhr.onerror = function() {
					console.log('Request Error ')
				}

				xhr.send();

			}

			//POST REQUEST 
			document.getElementById('post_button').addEventListener('click', postUser);	

			function postUser() {
				var http = new XMLHttpRequest();
				var url = 'adobe.php';
				var params = 'name=david&location=shire';
				http.open('POST', url, true);

				//Send the proper header information along with the request
				http.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');

				http.onreadystatechange = function() {//Call a function when the state changes.
					if(http.readyState == 4 && http.status == 200) {
						console.log(http.responseText);
					}
				}
				http.send(params);

			}
			
		</script>		
	</body>
</html>
